name: mobile-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: cd mobile && flutter pub get
      - run: cd mobile && dart format --set-exit-if-changed .
      - run: cd mobile && flutter analyze
      - run: cd mobile && flutter test
      - run: cd mobile && flutter build apk --debug

  mobile-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: cd mobile && flutter pub get
      - uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis
          arch: x86_64
          script: cd mobile && flutter test integration_test -d emulator-5554

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm run prisma:generate
      - run: cd backend && npx prisma validate
      - run: cd backend && npx prettier --check "src/**/*.ts" "test/**/*.ts" "prisma.config.ts"
      - run: cd backend && npm run build
      - run: cd backend && npm test
